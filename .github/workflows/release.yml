name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "name=Wallora v${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "tag=latest" >> "$GITHUB_OUTPUT"
          echo "apk_name=wallora-${VERSION}-${SHORT_SHA}-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.version.outputs.apk_name }}"

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ${{ steps.version.outputs.name }}
          body: |
            Latest debug build from `master`.
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          prerelease: true
          files: ${{ steps.version.outputs.apk_name }}
