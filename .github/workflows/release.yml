name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git log changelog

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Decode release keystore
        # Decodes the base64 keystore secret into a temp file for stable APK signing.
        # If the secret is absent (forks, open PRs) the build still succeeds via debug fallback.
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/wallora-release.keystore"
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/wallora-release.keystore" >> "$GITHUB_ENV"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}" >> "$GITHUB_ENV"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "Using dedicated release keystore"
          else
            echo "No keystore secret found — will fall back to debug signing"
          fi

      - name: Inject API keys
        # Writes repo secrets into local.properties so BuildConfig picks them up.
        # Keys absent from secrets silently produce empty strings (safe default — source skips itself).
        run: |
          [ -n "${{ secrets.PEXELS_API_KEY }}" ]   && echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}"     >> local.properties || true
          [ -n "${{ secrets.UNSPLASH_ACCESS_KEY }}" ] && echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" >> local.properties || true
          [ -n "${{ secrets.WALLHAVEN_API_KEY }}" ] && echo "WALLHAVEN_API_KEY=${{ secrets.WALLHAVEN_API_KEY }}" >> local.properties || true
          [ -n "${{ secrets.PIXABAY_API_KEY }}" ]  && echo "PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}"   >> local.properties || true

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "apk_name=wallora-v${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            # Initial release — write static feature list
            cat << 'EOF' > /tmp/changelog.md
          ## Features

          - **Multi-source browsing** — pulls wallpapers from Pexels, Unsplash, Wallhaven, and Reddit simultaneously
          - **Portrait-only filtering** — all sources return only wallpapers that fit a phone screen
          - **Auto-change wallpaper** — scheduled rotation with configurable interval, playlist (favourites or categories), and time-of-day slots
          - **Live wallpaper & parallax** — set Wallora as a live wallpaper for a subtle depth effect on the home screen
          - **Favourites** — long-press any wallpaper to save it; browse your collection offline
          - **Category browsing** — curated topics (Nature, Architecture, Space, Abstract, Animals, and more)
          - **Custom topics** — add your own search keywords as browsable categories
          - **Reddit subreddits** — toggle from 12 pre-configured subreddits or add your own
          - **API key support** — bring your own Pexels, Unsplash, or Wallhaven key for higher rate limits
          - **Settings search** — find any setting instantly from the search bar
          - **Minimal Material 3 UI** — clean, dark-friendly design with no ads or tracking
          - **Change from anywhere** — supports Nova/Lawnchair gestures, quick-settings tile, and Tasker intent
          EOF
          else
            echo "Changes since ${PREV_TAG}:" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s" \
              --no-merges \
              | grep -v "Co-Authored-By" \
              | grep -Ev "^- 🔧 chore\(ci\)" \
              >> /tmp/changelog.md
          fi

          # Pass multi-line output to GitHub
          {
            echo "body<<CHANGELOG_EOF"
            cat /tmp/changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "${{ steps.version.outputs.apk_name }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Wallora ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ### Install
            Download `wallora-${{ steps.version.outputs.tag }}.apk` and sideload it:
            - **Files app / browser:** Settings → Apps → Install unknown apps → enable for your app, then tap the APK
            - **ADB:** `adb install wallora-${{ steps.version.outputs.tag }}.apk`
          make_latest: true
          files: ${{ steps.version.outputs.apk_name }}
